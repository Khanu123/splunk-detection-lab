name: tests

on:
  push:
  pull_request:

jobs:
  detection-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: PYTHONPATH=src python -m splunk_detection_lab.detector --report docs/examples/example_detection_report.md
